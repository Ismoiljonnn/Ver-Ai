<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerAi — Kirish</title>
  <link rel="icon" type="image/png" href="VerAi.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0ede6;
      --muted: #888;
      --accent: #1C9AFD;
      --accent-dark: #1482D9;
      --fake: #ff5c5c;
      --real: #5cffa0;
      --glow: rgba(28, 154, 253, 0.08);
      --card-bg: rgba(22, 22, 22, 0.85);
    }

    :root[data-theme="light"] {
      --bg: #f2f2f0;
      --surface: #ffffff;
      --surface2: #ebebeb;
      --border: #d8d8d8;
      --text: #111111;
      --muted: #777;
      --accent: #1282d8;
      --accent-dark: #0e6db8;
      --fake: #cc2222;
      --real: #0a8a40;
      --glow: rgba(18, 130, 216, 0.06);
      --card-bg: rgba(255, 255, 255, 0.88);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--accent);
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: #8b5cf6;
      bottom: -15%;
      right: -10%;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: #06b6d4;
      top: 50%;
      left: 60%;
      animation-delay: -8s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(40px, -30px) scale(1.15);
      }
    }

    :root[data-theme="light"] .orb {
      opacity: 0.15;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-toggle:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      stroke: var(--text);
      fill: none;
    }

    /* Main container */
    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo area */
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 99px;
      margin-bottom: 1rem;
    }

    .auth-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .auth-logo h1 span {
      color: var(--accent);
    }

    .auth-logo p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Auth card */
    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15), 0 0 0 1px var(--glow);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 1.5rem;
        border-radius: 16px;
      }
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.8rem;
      position: relative;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.25s;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-tab.active {
      color: var(--text);
    }

    .tab-indicator {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--surface);
      border-radius: 9px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-indicator.right {
      transform: translateX(calc(100% + 4px));
    }

    /* Form */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.3s;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input:focus~.input-icon,
    .form-input:focus+.input-icon {
      stroke: var(--accent);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    /* Password visibility */
    .pwd-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s;
    }

    .pwd-toggle:hover {
      color: var(--text);
    }

    .pwd-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    /* Submit button */
    .auth-btn {
      width: 100%;
      padding: 14px;
      margin-top: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .auth-btn:hover {
      background: var(--accent-dark);
      box-shadow: 0 4px 20px rgba(28, 154, 253, 0.3);
    }

    .auth-btn:active {
      transform: scale(0.98);
    }

    .auth-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .auth-btn .btn-loader {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--accent);
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .auth-btn.loading .btn-text {
      visibility: hidden;
    }

    .auth-btn.loading .btn-loader {
      display: flex;
    }

    .btn-loader .ldot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: bounce 1.2s infinite;
    }

    .btn-loader .ldot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .btn-loader .ldot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.5);
        opacity: 0.3
      }

      40% {
        transform: scale(1);
        opacity: 1
      }
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0.3rem 0 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Error / Success messages */
    .auth-message {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .auth-message.error {
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.25);
      color: var(--fake);
    }

    .auth-message.success {
      background: rgba(92, 255, 160, 0.1);
      border: 1px solid rgba(92, 255, 160, 0.25);
      color: var(--real);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 12px;
      opacity: 0.5;
    }

    /* Password strength */
    .pwd-strength {
      display: flex;
      gap: 4px;
      height: 3px;
      margin-top: 2px;
    }

    .pwd-bar {
      flex: 1;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.3s;
    }

    .pwd-bar.weak {
      background: var(--fake);
    }

    .pwd-bar.medium {
      background: #ffb347;
    }

    .pwd-bar.strong {
      background: var(--real);
    }

    @media (max-width: 360px) {
      .auth-logo h1 {
        font-size: 1.6rem;
      }

      .form-input {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg id="themeIcon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
  </button>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-badge">VerAi</div>
      <h1>Xush <span>kelibsiz</span></h1>
      <p>Fake news detector tizimiga kirish</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="tab-indicator" id="tabIndicator"></div>
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Kirish</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
      </div>

      <!-- Message area -->
      <div class="auth-message" id="authMessage"></div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input class="form-input" type="email" id="loginEmail" placeholder="email@misol.uz" required
              autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Parol</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required
              autocomplete="current-password" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('loginPassword', this)">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button class="auth-btn" type="submit" id="loginBtn">
          <span class="btn-text">Kirish</span>
          <div class="btn-loader">
            <div class="ldot"></div>
            <div class="ldot"></div>
            <div class="ldot"></div>
          </div>
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input class="form-input" type="email" id="regEmail" placeholder="email@misol.uz" required
              autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Parol</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input class="form-input" type="password" id="regPassword" placeholder="Kamida 6 ta belgi" required
              minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('regPassword', this)">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="pwd-strength" id="pwdStrength">
            <div class="pwd-bar" id="bar1"></div>
            <div class="pwd-bar" id="bar2"></div>
            <div class="pwd-bar" id="bar3"></div>
            <div class="pwd-bar" id="bar4"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPasswordConfirm">Parolni tasdiqlash</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input class="form-input" type="password" id="regPasswordConfirm" placeholder="Parolni qaytadan kiriting"
              required minlength="6" autocomplete="new-password" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('regPasswordConfirm', this)">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button class="auth-btn" type="submit" id="registerBtn">
          <span class="btn-text">Ro'yxatdan o'tish</span>
          <div class="btn-loader">
            <div class="ldot"></div>
            <div class="ldot"></div>
            <div class="ldot"></div>
          </div>
        </button>
      </form>

      <div class="auth-divider"><span>VerAi</span></div>
    </div>

    <p class="auth-footer">BulderFounders — AI Hackathon 2025</p>
  </div>

  <script>
    // ── Theme ──────────────────────────────────
    let isDark = true;
    const moonSVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    const sunSVG = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').innerHTML = isDark ? moonSVG : sunSVG;
    }

    // ── Tab switching ──────────────────────────
    let currentTab = 'login';
    function switchTab(tab) {
      currentTab = tab;
      const indicator = document.getElementById('tabIndicator');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      if (tab === 'login') {
        indicator.classList.remove('right');
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.style.display = 'flex';
        registerForm.style.display = 'none';
      } else {
        indicator.classList.add('right');
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'flex';
      }
      hideMessage();
    }

    // ── Password visibility ────────────────────
    const eyeOpen = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const eyeClosed = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = isPassword ? eyeClosed : eyeOpen;
    }

    // ── Password strength ──────────────────────
    function checkStrength(pwd) {
      let score = 0;
      if (pwd.length >= 6) score++;
      if (pwd.length >= 8) score++;
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
      if (/\d/.test(pwd) || /[^a-zA-Z0-9]/.test(pwd)) score++;

      const bars = ['bar1', 'bar2', 'bar3', 'bar4'];
      const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
      bars.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'pwd-bar';
        if (i < score) el.classList.add(cls);
      });
    }

    // ── Messages ───────────────────────────────
    function showMessage(text, type) {
      const el = document.getElementById('authMessage');
      el.textContent = text;
      el.className = 'auth-message ' + type;
      el.style.display = 'block';
    }
    function hideMessage() {
      document.getElementById('authMessage').style.display = 'none';
    }

    // ── Login ──────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      hideMessage();
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          showMessage('Muvaffaqiyatli kirdingiz! Yo\'naltirilmoqda...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showMessage(data.error || 'Xatolik yuz berdi', 'error');
        }
      } catch (err) {
        showMessage('Tarmoq xatoligi. Qayta urinib ko\'ring.', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // ── Register ───────────────────────────────
    async function handleRegister(e) {
      e.preventDefault();
      hideMessage();
      const btn = document.getElementById('registerBtn');
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;

      if (password !== confirm) {
        showMessage('Parollar mos kelmaydi', 'error');
        return;
      }
      if (password.length < 6) {
        showMessage('Parol kamida 6 ta belgidan iborat bo\'lishi kerak', 'error');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          if (data.needs_confirmation) {
            showMessage('Ro\'yxatdan o\'tdingiz! Emailingizni tekshiring va tasdiqlang.', 'success');
          } else {
            showMessage('Muvaffaqiyatli! Yo\'naltirilmoqda...', 'success');
            setTimeout(() => { window.location.href = '/'; }, 800);
          }
        } else {
          showMessage(data.error || 'Xatolik yuz berdi', 'error');
        }
      } catch (err) {
        showMessage('Tarmoq xatoligi. Qayta urinib ko\'ring.', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // ── Check if already logged in ────────────
    (async () => {
      try {
        const res = await fetch('/api/me');
        if (res.ok) {
          const data = await res.json();
          if (data.authenticated) window.location.href = '/';
        }
      } catch (_) { }
    })();
  </script>
</body>
